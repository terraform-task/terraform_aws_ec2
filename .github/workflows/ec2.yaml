name: Terraform
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose apply or destroy action'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy
permissions:
    id-token: write
    contents: read
jobs:
    terraform:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME}}
                aws-region: ap-south-1

            - name: Set up Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Create S3 bucket if not exists
              run: |
                if ! aws s3api head-bucket --bucket "${{ vars.BUCKET_NAME }}" 2>/dev/null; then
                  aws s3api create-bucket --bucket "${{ vars.BUCKET_NAME }}" --region ap-south-1 --create-bucket-configuration LocationConstraint=ap-south-1
                else
                  echo "Bucket already exists"
                fi

            - name: Create DynamoDB table if not exists
              run: |
                if ! aws dynamodb describe-table --table-name "${{ vars.DYNAMODB_TABLE }}" --region ap-south-1 2>/dev/null; then
                  aws dynamodb create-table \
                    --table-name "${{ vars.DYNAMODB_TABLE }}" \
                    --attribute-definitions AttributeName=LockID,AttributeType=S \
                    --key-schema AttributeName=LockID,KeyType=HASH \
                    --provisioned-throughput ReadCapacityUnits=5,WriteCapacityUnits=5 \
                    --region ap-south-1
                  echo "DynamoDB table created"
                else
                  echo "DynamoDB table already exists"
                fi

            - name: Initialize Terraform
              run: |
                terraform init \
                  --backend-config="bucket=${{ vars.BUCKET_NAME }}" \
                  --backend-config="key=eks/terraform.tfstate" \
                  --backend-config="region=ap-south-1" \
                  --backend-config="dynamodb_table=${{ vars.DYNAMODB_TABLE }}"

            - name: Validate Terraform configuration
              run: terraform validate

            - name: Plan Terraform changes
              run: |
                if [ "${{ github.event.inputs.action }}" == "destroy" ]; then
                  terraform plan -destroy;
                else
                  terraform plan;
                fi

            - name: Apply Terraform or Destroy
              run: |
                if [ "${{ github.event.inputs.action }}" == "apply" ]; then
                  terraform apply -auto-approve;
                elif [ "${{ github.event.inputs.action }}" == "destroy" ]; then
                  terraform destroy -auto-approve;
                else
                  echo "Invalid action specified. Use 'apply' or 'destroy'.";
                  exit 1;
                fi

            - name: Delete S3 bucket if destroy
              if: ${{ github.event.inputs.action == 'destroy' }}
              run: |
                # Empty the bucket first (required before deletion)
                aws s3 rm s3://${{ vars.BUCKET_NAME }} --recursive || true
                # Delete the bucket
                aws s3api delete-bucket --bucket "${{ vars.BUCKET_NAME }}" --region ap-south-1 || true

            - name: Delete DynamoDB table if destroy
              if: ${{ github.event.inputs.action == 'destroy' }}
              run: |
                aws dynamodb delete-table --table-name "${{ vars.DYNAMODB_TABLE }}" --region ap-south-1 || true